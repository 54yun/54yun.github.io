<!DOCTYPE html>
<html lang="zh">
<head>

  <meta name="color-scheme" content="dark light">
  <link rel="stylesheet" type="text/css" href="assets/css/main.css"/>
  <style>
    .about { margin: 100px auto 0; max-width: 600px; padding: 0 20px; text-align: left; }
    @media (max-width: 767px) { .about { margin-top: 50px; } }
    .about h1 { margin-bottom: 10px; text-align: center; }
    .about .back { font-size: 14px; margin-bottom: 40px; display: block; text-align: center; }
    .about .back a { color: #999; text-decoration: none; border-bottom: 1px dotted #999; }
    .about .back a:hover { border-bottom-style: solid; }
    .about .section { margin-bottom: 36px; }
    .about .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .about .section p { margin: 10px 0; font-size: 15px; line-height: 1.9; }
    @media (prefers-color-scheme: dark) {
      .about .section p { color: #99A3BA; }

<body>
  <div class="about">
    <h1>暴风城茶馆</h1>
    <span class="back"><a href="/">← 回到首页</a></span>

    <div class="section">
      <div class="section-title">简介</div>
      <p>一个喜欢写代码的人，闲暇时会折腾一些有趣的项目。这个站点是我在互联网上的一个小角落，用来记录和分享。</p>
    </div>

    <div class="section">
      <div class="section-title">历史</div>
      <p>2015 年搭建了这个个人主页，从最初的简单页面一步步迭代至今。这些年经历了不少变化，但这个小站一直都在，像一个安静的存档点，记录着走过的路。</p>
    </div>

    <div class="section">
      <div class="section-title">景愿</div>
      <p>保持好奇，保持学习。希望能持续做出有意思的东西，也希望能在这个快节奏的时代里，保有一块属于自己的、可以慢慢打磨的空间。</p>
    </div>
  </div>
